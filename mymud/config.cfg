# FluffOS MUD 配置文件

# MUD 名称
name : 我的MUD游戏

# 绑定所有网络接口
mud ip : 0.0.0.0

# Telnet 端口（传统文本客户端）
external_port_1: telnet 4000

# WebSocket 端口（网页客户端）
external_port_2: websocket 8080

# WebSocket 网页文件目录
websocket http dir : ./www

# mudlib 目录（使用相对路径）
mudlib directory : ./

# 日志目录
log directory : /log

# 头文件搜索路径
include directories : /include

# 核心文件
master file : /single/master
simulated efun file : /single/simul_efun
global include file : <globals.h>

# 日志文件
debug log file : debug.log

# 默认消息（设置为 \n 只显示换行）
default fail message : \n
default error message : \n 

# 时间设置（秒）
time to clean up : 600
time to reset : 1800
time to swap : 300

# 执行限制
maximum evaluation cost : 5000000
maximum call depth : 150
maximum local variables : 50

# 数据结构大小限制
maximum array size : 15000
maximum buffer size : 400000
maximum mapping size : 15000
maximum string length : 200000
maximum bits in a bitfield : 12000
maximum byte transfer : 200000
maximum read file size : 200000

# 哈希表大小
hash table size : 7001
object table size : 1501
living hash table size : 256

# 游戏时钟
gametick msec : 100
heartbeat interval msec : 1000

# 行为选项
sane explode string : 1
reversible explode string : 0
sane sorting : 1
warn tab : 0
wombles : 0
call other type check : 0
call other warn : 0

# 错误处理
mudlib error handler : 1
trap crashes : 1

# 重置选项
no resets : 0
lazy resets : 0
randomized resets : 1

# ANSI 颜色 - 已禁用
no ansi : 1
strip before process input: 1

# 其他选项
this_player in call_out : 1
trace : 1
trace code : 0
interactive catch tell : 0
receive snoop : 1
snoop shadowed : 0
reverse defer : 0
has console : 1
noninteractive stderr write : 0
old type behavior : 0
old range behavior : 0
warn old range behavior : 0
suppress argument warnings : 1
enable_commands call init : 0
sprintf add_justified ignore ANSI colors : 1

# call_out(0) 循环防护
call_out(0) nest level : 1000

# 协议支持
enable mxp : 1
enable gmcp : 1
enable zmp : 1
enable mssp : 1
enable msp : 1
enable msdp : 1

# 最大用户数
maximum users : 100
