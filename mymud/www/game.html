<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修仙世界 MUD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px 15px;
            border-bottom: 2px solid #0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #0ff;
        }
        
        .status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(255, 0, 0, 0.2);
            color: #f00;
        }
        
        .status.connected {
            background: rgba(0, 255, 0, 0.2);
            color: #0f0;
        }
        
        #output {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            background: #000;
            line-height: 1.6;
            word-wrap: break-word;
            -webkit-overflow-scrolling: touch;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }
        
        #output::-webkit-scrollbar {
            width: 4px;
        }
        
        #output::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 2px;
        }
        
        .quick-bar {
            background: #1a1a2e;
            padding: 6px;
            border-top: 1px solid #0f0;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .quick-bar::-webkit-scrollbar {
            height: 0;
        }
        
        .quick-btn {
            padding: 6px 14px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            border-radius: 4px;
            color: #0f0;
            font-size: 12px;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        
        .quick-btn:active {
            background: #0f0;
            color: #000;
        }
        
        .input-area {
            background: #16213e;
            padding: 8px;
            border-top: 1px solid #0f0;
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        
        #input {
            flex: 1;
            background: #000;
            border: 2px solid #0f0;
            border-radius: 4px;
            padding: 8px 10px;
            color: #0f0;
            font-size: 13px;
            font-family: monospace;
        }
        
        #input:focus {
            outline: none;
            border-color: #0ff;
        }
        
        #sendBtn {
            padding: 8px 18px;
            background: #0f0;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        
        #sendBtn:active {
            background: #0ff;
        }
        
        @media (min-width: 768px) {
            .header {
                padding: 12px 20px;
            }
            
            .title {
                font-size: 18px;
            }
            
            .status {
                font-size: 12px;
                padding: 4px 12px;
            }
            
            #output {
                padding: 15px;
                font-size: 14px;
            }
            
            .quick-bar {
                padding: 8px;
                gap: 6px;
            }
            
            .quick-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .input-area {
                padding: 10px;
                gap: 8px;
            }
            
            #input {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            #sendBtn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">⚔️ 修仙世界</div>
        <div class="status" id="status">连接中...</div>
    </div>
    
    <div id="output">正在连接到服务器...\n请稍候...</div>
    
    <div class="quick-bar">
        <button class="quick-btn" onclick="sendQuick('look')">查看</button>
        <button class="quick-btn" onclick="sendQuick('map')">地图</button>
        <button class="quick-btn" onclick="sendQuick('status')">状态</button>
        <button class="quick-btn" onclick="sendQuick('xiulian')">修炼</button>
        <button class="quick-btn" onclick="sendQuick('tupo')">突破</button>
        <button class="quick-btn" onclick="sendQuick('inventory')">背包</button>
        <button class="quick-btn" onclick="sendQuick('who')">在线</button>
        <button class="quick-btn" onclick="sendQuick('help')">帮助</button>
    </div>
    
    <div class="input-area">
        <input type="text" id="input" placeholder="输入命令..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
    
    <script>
        let ws = null;
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        
        function addOutput(text) {
            output.textContent += text;
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            output.textContent = '';
        }
        
        function updateStatus(connected) {
            if (connected) {
                status.textContent = '已连接';
                status.className = 'status connected';
            } else {
                status.textContent = '未连接';
                status.className = 'status';
            }
        }
        
        function processText(text) {
            // 简单清理：只移除 ANSI 和替换特殊字符
            
            // 移除 ANSI 转义序列
            text = text.replace(/\x1b\[[0-9;]*m/g, '');
            
            // 替换 Unicode 框线字符为 ASCII
            text = text.replace(/╔/g, '-');
            text = text.replace(/╗/g, '-');
            text = text.replace(/╚/g, '-');
            text = text.replace(/╝/g, '-');
            text = text.replace(/═/g, '=');
            text = text.replace(/║/g, '|');
            text = text.replace(/─/g, '-');
            text = text.replace(/│/g, '|');
            text = text.replace(/【/g, '[');
            text = text.replace(/】/g, ']');
            
            return text;
        }
        
        function connect() {
            clearOutput();
            addOutput('正在连接...\n');
            
            const hostname = window.location.hostname;
            const wsUrl = 'ws://' + hostname + ':8080';
            
            console.log('连接到:', wsUrl);
            
            try {
                ws = new WebSocket(wsUrl, ['telnet']);
                
                ws.onopen = function() {
                    console.log('WebSocket 已连接');
                    addOutput('连接成功！\n\n');
                    updateStatus(true);
                    input.focus();
                };
                
                ws.onmessage = function(event) {
                    if (event.data instanceof Blob) {
                        event.data.arrayBuffer().then(buffer => {
                            const bytes = new Uint8Array(buffer);
                            const cleanBytes = [];
                            
                            // 过滤 Telnet IAC 命令
                            let i = 0;
                            while (i < bytes.length) {
                                if (bytes[i] === 0xFF || bytes[i] === 0xFD || bytes[i] === 0xFE || bytes[i] === 0xFB || bytes[i] === 0xFC) {
                                    // IAC 命令，跳过它和后面的参数
                                    if (bytes[i] === 0xFF && i + 1 < bytes.length) {
                                        const cmd = bytes[i + 1];
                                        if (cmd >= 0xFB && cmd <= 0xFE) {
                                            // WILL/WONT/DO/DONT - 跳过3个字节
                                            i += 3;
                                        } else if (cmd === 0xFA) {
                                            // SB (subnegotiation) - 跳到 SE (0xF0)
                                            i += 2;
                                            while (i < bytes.length && bytes[i] !== 0xF0) i++;
                                            i++;
                                        } else {
                                            i += 2;
                                        }
                                    } else {
                                        i += 2;
                                    }
                                } else {
                                    cleanBytes.push(bytes[i]);
                                    i++;
                                }
                            }
                            
                            // 转换为 UTF-8 文本
                            const decoder = new TextDecoder('utf-8');
                            let text = decoder.decode(new Uint8Array(cleanBytes));
                            
                            // 移除 ANSI 代码
                            text = text.replace(/\x1b\[[0-9;]*m/g, '');
                            text = processText(text);
                            addOutput(text);
                        });
                    } else {
                        let text = event.data;
                        text = text.replace(/\x1b\[[0-9;]*m/g, '');
                        text = processText(text);
                        addOutput(text);
                    }
                };
                
                ws.onerror = function(error) {
                    console.error('WebSocket 错误:', error);
                    addOutput('连接错误\n');
                };
                
                ws.onclose = function(event) {
                    console.log('WebSocket 已关闭');
                    addOutput('\n连接已断开\n');
                    updateStatus(false);
                    setTimeout(() => {
                        addOutput('5秒后重新连接...\n');
                        setTimeout(connect, 5000);
                    }, 1000);
                };
            } catch (e) {
                console.error('连接失败:', e);
                addOutput('连接失败: ' + e.message + '\n');
            }
        }
        
        function sendCommand(cmd) {
            if (!cmd) return;
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addOutput('错误：未连接到服务器\n');
                return;
            }
            
            try {
                ws.send(cmd + '\n');
                console.log('发送命令:', cmd);
                input.value = '';
            } catch (e) {
                console.error('发送失败:', e);
                addOutput('发送失败\n');
            }
        }
        
        function sendQuick(cmd) {
            sendCommand(cmd);
        }
        
        sendBtn.addEventListener('click', function() {
            const cmd = input.value.trim();
            sendCommand(cmd);
        });
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.trim();
                sendCommand(cmd);
            }
        });
        
        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 启动连接
        connect();
    </script>
</body>
</html>
